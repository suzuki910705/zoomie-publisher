<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="application-name" content="Zoomie Publisher" />
    <title>TikTok OAuth Callback - Zoomie Publisher</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="app-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="top">
        <div class="brand">Zoomie Publisher</div>
        <h1>TikTok OAuth Callback</h1>
        <p class="lead">Completing TikTok authorization...</p>
      </header>

      <section class="paper">
        <h2>Status</h2>
        <p id="status">Redirecting to Zoomie Publisher...</p>
        <p><a id="fallback" href="#">Continue to Zoomie Publisher</a></p>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code") || "";
      const error = params.get("error") || "";
      const errorDescription = params.get("error_description") || "";

      if (!code) {
        const message = error
          ? ["TikTok authorization failed.", error, errorDescription].filter(Boolean).join(" ")
          : "No authorization code was found in this callback URL.";
        document.getElementById("status").textContent = message;
        document.getElementById("fallback").removeAttribute("href");
      } else {
        const target = new URL("https://comfyui-schedule.joyso.io/api/oauth/tiktok/callback");
        target.search = window.location.search;

        document.getElementById("fallback").href = target.toString();
        window.location.replace(target.toString());
      }
    </script>
  </body>
</html>
